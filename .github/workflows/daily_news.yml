name: Daily AI News Fetcher

on:
  schedule:
    # 매일 06:00 KST (21:00 UTC)
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Fetch Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ENABLE_TWITTER: 'false'
        run: node scripts/fetch_news.js

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/data/news.json
          git commit -m "chore(data): update daily news" || exit 0
          git push

      - name: Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            node -e "require('./scripts/notify').notifyDailySummary()"
          else
            echo "DISCORD_WEBHOOK_URL not set — skipping Discord notification"
          fi
